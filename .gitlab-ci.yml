variables:
  PYTHON_VERSION: 3.11

image: python:$PYTHON_VERSION

before_script:
  - apt-get update && apt-get install -y curl
  - curl -LsSf https://astral.sh/uv/install.sh | sh
  - export PATH=$HOME/.local/bin:$PATH

stages:
  - check

check_code_quality:
  stage: check
  script:
  -  |
    # Run the formatting and linting checks
    uvx ruff check --no-fix --config pyproject.toml
    uvx ruff format --check --config pyproject.toml

    # Run the docstring coverage check
    uvx interrogate --config pyproject.toml

  only:
    - merge_requests
